name: Multi-Platform Release Build

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  release:
    name: Build Release for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: paddleocr-rust-cli-windows-amd64
            archive_name: paddleocr-rust-cli-windows-amd64.zip
          - os: ubuntu-22.04
            artifact_name: paddleocr-rust-cli-linux-amd64
            archive_name: paddleocr-rust-cli-linux-amd64.tar.gz
          - os: macos-latest
            artifact_name: paddleocr-rust-cli-macos-universal
            archive_name: paddleocr-rust-cli-macos-universal.tar.gz

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # Linux 专用：安装 musl 工具链，实现 GLIBC-free 静态链接
      - name: Install musl tools (Linux only)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y musl-tools
          rustup target add x86_64-unknown-linux-musl

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Build release binary (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        env:
          ORT_DYLIB_PATH: libs/onnxruntime.dll
        run: |
          cargo build --release

      # Linux: 使用 musl target 编译，产物完全静态链接，不依赖任何 GLIBC 版本
      - name: Build release binary (Linux - musl static)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          cargo build --release --target x86_64-unknown-linux-musl

      - name: Build release binary (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          cargo build --release

      - name: Prepare Release Artifacts (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          mkdir -p release-pkg
          cp target/release/ocr-rust.exe release-pkg/
          cp libs/onnxruntime.dll release-pkg/
          cp README.md release-pkg/
          cd release-pkg
          tar -a -c -f ../${{ matrix.archive_name }} *

      # Linux: 从 musl target 目录拷贝产物
      - name: Prepare Release Artifacts (Linux - musl static)
        if: matrix.os == 'ubuntu-22.04'
        shell: bash
        run: |
          mkdir -p release-pkg
          cp target/x86_64-unknown-linux-musl/release/ocr-rust release-pkg/
          # musl 静态链接无需拷贝 onnxruntime 动态库，模型已内嵌
          cp README.md release-pkg/
          tar -czf ${{ matrix.archive_name }} -C release-pkg .

      - name: Prepare Release Artifacts (macOS)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          mkdir -p release-pkg
          cp target/release/ocr-rust release-pkg/
          cp target/release/libonnxruntime* release-pkg/ 2>/dev/null || true
          cp README.md release-pkg/
          tar -czf ${{ matrix.archive_name }} -C release-pkg .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.archive_name }}

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.archive_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
