name: Multi-Platform Release Build

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  release:
    name: Build Release for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: paddleocr-rust-cli-windows-amd64
            archive_name: paddleocr-rust-cli-windows-amd64.zip
          - os: ubuntu-22.04
            artifact_name: paddleocr-rust-cli-linux-amd64
            archive_name: paddleocr-rust-cli-linux-amd64.tar.gz
          - os: macos-latest
            artifact_name: paddleocr-rust-cli-macos-universal
            archive_name: paddleocr-rust-cli-macos-universal.tar.gz

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Windows / macOS: 正常安装 Rust 工具链
      - name: Set up Rust toolchain
        if: matrix.os != 'ubuntu-22.04'
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        if: matrix.os != 'ubuntu-22.04'
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v3-${{ matrix.os }}"

      # ====== Windows 构建 ======
      - name: Build release binary (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        env:
          ORT_DYLIB_PATH: libs/onnxruntime.dll
        run: cargo build --release

      # ====== Linux 构建：Docker ubuntu:20.04 容器内编译 ======
      # 核心原理：在 GLIBC 2.31 (Ubuntu 20.04) 上编译，产物天然兼容所有 GLIBC >= 2.31 的 Linux
      # 同时解决了 libstdc++ (GLIBCXX) 版本兼容性问题
      - name: Create Docker build script (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          cat > /tmp/docker-build.sh << 'BUILDSCRIPT'
          #!/bin/bash
          set -eo pipefail
          export DEBIAN_FRONTEND=noninteractive

          # Ubuntu 20.04 repos fallback to old-releases mirror if needed
          apt-get update -q 2>/dev/null || {
            sed -i 's|http://archive.ubuntu.com|http://old-releases.ubuntu.com|g' /etc/apt/sources.list
            sed -i 's|http://security.ubuntu.com|http://old-releases.ubuntu.com|g' /etc/apt/sources.list
            apt-get update -q
          }

          apt-get install -y -q curl build-essential pkg-config libssl-dev ca-certificates

          # Install Rust stable toolchain
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          . "$HOME/.cargo/env"

          ORT_VERSION=1.24.2
          ORT_DIR=/tmp/onnxruntime-linux-x64-${ORT_VERSION}

          # 下载官方的 ONNX Runtime 并使用系统动态链接模式，同时设置 RPATH
          echo "📥 Downloading official ONNX Runtime v${ORT_VERSION} for Linux x64..."
          curl -L -o /tmp/onnxruntime.tgz https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VERSION}/onnxruntime-linux-x64-${ORT_VERSION}.tgz
          tar -xzf /tmp/onnxruntime.tgz -C /tmp

          export ORT_LIB_LOCATION=${ORT_DIR}/lib
          export ORT_PREFER_DYNAMIC_LINK=1
          export RUSTFLAGS="-C link-arg=-Wl,-rpath,\$ORIGIN"

          # Build release binary
          echo "🔨 Starting cargo build --release ..."
          cargo build --release
          echo "✅ Build completed successfully!"

          # 保留官方 so 文件名与符号链接，保证运行时依赖可以被正确解析
          mkdir -p target/release
          cp -P ${ORT_DIR}/lib/libonnxruntime.so* target/release/
          BUILDSCRIPT
          chmod +x /tmp/docker-build.sh

      - name: Build release binary (Linux via Docker ubuntu 20.04)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -v "/tmp/docker-build.sh:/docker-build.sh:ro" \
            -w /workspace \
            ubuntu:20.04 \
            bash /docker-build.sh
          # Fix file ownership: Docker runs as root, runner user needs access
          sudo chown -R "$(id -u):$(id -g)" target/

      # ====== macOS 构建 ======
      - name: Build release binary (macOS)
        if: matrix.os == 'macos-latest'
        run: cargo build --release

      # ====== 打包：Windows ======
      - name: Prepare Release Artifacts (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          mkdir -p release-pkg
          cp target/release/ocr-rust.exe release-pkg/
          cp libs/onnxruntime.dll release-pkg/
          cp README.md release-pkg/
          cd release-pkg
          tar -a -c -f ../${{ matrix.archive_name }} *

      # ====== 打包：Linux ======
      - name: Prepare Release Artifacts (Linux)
        if: matrix.os == 'ubuntu-22.04'
        shell: bash
        run: |
          mkdir -p release-pkg
          cp target/release/ocr-rust release-pkg/
          cp -P target/release/libonnxruntime.so* release-pkg/
          cp README.md release-pkg/
          tar -czf ${{ matrix.archive_name }} -C release-pkg .

      # ====== 打包：macOS ======
      - name: Prepare Release Artifacts (macOS)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          mkdir -p release-pkg
          cp target/release/ocr-rust release-pkg/
          cp target/release/libonnxruntime* release-pkg/ 2>/dev/null || true
          cp README.md release-pkg/
          tar -czf ${{ matrix.archive_name }} -C release-pkg .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.archive_name }}

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.archive_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
