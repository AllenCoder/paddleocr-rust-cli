name: Release Build

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  build-windows:
    name: Build for Windows
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        shell: bash
        env:
          ORT_DYLIB_PATH: ${{ github.workspace }}/libs/onnxruntime.dll
        run: |
          cargo build --release

      - name: Prepare Release Artifacts
        shell: bash
        run: |
          mkdir -p release-pkg
          cp target/release/ocr-rust.exe release-pkg/
          cp libs/onnxruntime.dll release-pkg/
          cp README.md release-pkg/
          cd release-pkg
          tar -a -c -f ../paddleocr-rust-cli-windows-x64.zip *

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: paddleocr-rust-cli-windows-x64
          path: paddleocr-rust-cli-windows-x64.zip

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: paddleocr-rust-cli-windows-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
