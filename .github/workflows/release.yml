name: Multi-Platform Release Build

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  release:
    name: Build Release for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: paddleocr-rust-cli-windows-amd64
            archive_name: paddleocr-rust-cli-windows-amd64.zip
          - os: ubuntu-22.04
            artifact_name: paddleocr-rust-cli-linux-amd64
            archive_name: paddleocr-rust-cli-linux-amd64.tar.gz
          - os: macos-latest
            artifact_name: paddleocr-rust-cli-macos-universal
            archive_name: paddleocr-rust-cli-macos-universal.tar.gz

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          # 关键：在缓存键中加入 OS 信息，防止不同 OS 的 build-script 二进制互相污染
          prefix-key: "v2-${{ matrix.os }}"

      # ====== Windows 构建 ======
      - name: Build release binary (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        env:
          ORT_DYLIB_PATH: libs/onnxruntime.dll
        run: |
          cargo build --release

      # ====== Linux 构建：使用 cargo-zigbuild 限定最低 GLIBC 版本 ======
      # zigbuild 用 zig 作为链接器，可精确控制目标 GLIBC 版本，兼容所有 Linux
      - name: Install zig and cargo-zigbuild (Linux only)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          pip3 install ziglang
          cargo install cargo-zigbuild --locked
          rustup target add x86_64-unknown-linux-gnu

      - name: Build release binary (Linux - zigbuild for GLIBC 2.17 compat)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          # 目标 GLIBC 2.17 = CentOS 7 / Ubuntu 14.04 时代，几乎覆盖所有 Linux
          cargo zigbuild --release --target x86_64-unknown-linux-gnu.2.17

      # ====== macOS 构建 ======
      - name: Build release binary (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          cargo build --release

      # ====== 打包：Windows ======
      - name: Prepare Release Artifacts (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          mkdir -p release-pkg
          cp target/release/ocr-rust.exe release-pkg/
          cp libs/onnxruntime.dll release-pkg/
          cp README.md release-pkg/
          cd release-pkg
          tar -a -c -f ../${{ matrix.archive_name }} *

      # ====== 打包：Linux (zigbuild 输出在 gnu target 目录下) ======
      - name: Prepare Release Artifacts (Linux)
        if: matrix.os == 'ubuntu-22.04'
        shell: bash
        run: |
          mkdir -p release-pkg
          cp target/x86_64-unknown-linux-gnu/release/ocr-rust release-pkg/
          # ort 的 copy-dylibs 特性会把 libonnxruntime.so 复制到 target 目录
          cp target/x86_64-unknown-linux-gnu/release/libonnxruntime* release-pkg/ 2>/dev/null || true
          cp README.md release-pkg/
          tar -czf ${{ matrix.archive_name }} -C release-pkg .

      # ====== 打包：macOS ======
      - name: Prepare Release Artifacts (macOS)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          mkdir -p release-pkg
          cp target/release/ocr-rust release-pkg/
          cp target/release/libonnxruntime* release-pkg/ 2>/dev/null || true
          cp README.md release-pkg/
          tar -czf ${{ matrix.archive_name }} -C release-pkg .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.archive_name }}

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.archive_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
